<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Chats</title>
  <style>
    :root { --black:#181515; --dark-gray:#181515; --green:#3f1587; --white:#ffffff; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body,html { height:100%; background:var(--black); font-family:Arial,sans-serif; color:var(--white); display:flex; justify-content:center; align-items:center; }
    #loginPage,#privateChatPage { width:100%; height:100%; flex-direction:column; justify-content:center; align-items:center; display:none; }
    .form-group { margin:8px 0; }
    input, textarea, select { padding:8px; border:none; border-radius:6px; width:200px; }
    button { background:var(--green); border:none; padding:8px 16px; border-radius:6px; cursor:pointer; color:var(--white); transition:0.2s; margin:2px; }
    button:hover { transform:scale(1.05); }
    .logout-btn { position:absolute; top:10px; right:10px; background:crimson; }
    .global-chat-btn { position:absolute; top:10px;}
    .settings-btn { position:absolute; top:10px; left:10px; }
    .profile-btn { position:absolute; top:10px; left:95px; }
    .reported-btn { position:absolute; top:10px; left:180px; background: #ffc107; color: #000; font-weight: bold; }
    .users-btn { position:absolute; top:10px; left:265px; background: #007bff; color: white; font-weight: bold; }
    .add-admin-btn { position:absolute; top:10px; left:335px; background: #8a2be2; color: white; font-weight: bold; }
    .private-chat-container { width:80vw; height:80vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; }
    
    .tab-container { display:flex; gap:5px; margin-bottom:8px; width:100%; }
    .tab-btn { background: rgba(255,255,255,0.1); flex: 1; border-radius: 6px; padding: 8px; font-weight: bold; position: relative; color: white; border: none; cursor: pointer; }
    .tab-btn.active { background: var(--green); }
    
    /* Banned Styling */
    .banned-username { text-decoration: underline wavy red !important; color: #ff6b6b !important; }
    .banned-notice { color: #ff4d4d; font-weight: bold; text-align: center; display: block; margin: 10px 0; font-size: 1.1em; }
    .user-mgmt-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; text-align: left; }

    .unread-indicator { position: absolute; top: 2px; right: 2px; color: #ff6b6b; font-size: 12px; }
    .user-unread-indicator { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #ff6b6b; font-size: 14px; }
    .message { position: relative; }
    .del-btn { background: none; border: none; cursor: pointer; position: absolute; top: 4px; right: 4px; color: red; font-size: 12px; }
    .date-sep { text-align: center; margin: 16px 0 8px 0; color: var(--white); font-weight: bold; font-size: 14px; }
    .timestamp { font-size: 10px; color: #ccc; margin-top: 4px; text-align: right; }
    .action-btn { font-size: 12px; padding: 5px 10px; margin-left: 5px; border-radius: 4px; }
    .btn-accept { background: #28a745; }
    .btn-deny { background: #ffc107; color: #000; }
    .btn-block { background: #dc3545; }
    .btn-unblock { background: #6c757d; }

    #notificationContainer { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
    .toast { background: #2a2a2a; border: 1px solid var(--green); border-radius: 8px; padding: 12px; width: 280px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: left; }
    .toast-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
    .close-toast { color: crimson; cursor: pointer; font-weight: bold; border:none; background:none; font-size:16px; padding: 0 4px; margin: 0; }
    .close-toast:hover { transform: scale(1.1); }
    .toast-body { margin-bottom: 12px; font-size: 14px; word-break: break-word; color: #ddd; }
    .toast-footer button { width: 100%; background: var(--green); margin: 0; }

    .modal-mask { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:100; }
    .modal { background:#222; padding:16px; border-radius:8px; width:90%; max-width:600px; max-height:90%; overflow:auto; }

    .profile-field { margin-top: 15px; text-align: left; }
    .profile-field label { display: block; font-weight: bold; margin-bottom: 5px; color: #00c50a; }

    .report-item { padding: 10px; border-bottom: 1px solid #444; text-align: left; margin-bottom: 10px; background: rgba(255,255,255,0.05); border-radius: 4px;}
    .report-log-container { background:#111; padding:10px; margin:10px 0; border-radius:8px; max-height:400px; overflow-y:auto; text-align:left; font-size:13px; color: #eee; }
    
    .sign-banned { background: #dc3545; color: white; padding: 5px; border-radius: 4px; text-align: center; font-weight: bold; margin-bottom: 10px; display: none; }
    
    /* Admin Perms */
    .perm-checkboxes { display: flex; flex-direction: column; gap: 5px; margin: 15px 0; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }
    .perm-checkboxes label { font-weight: normal; color: white; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 0; }
  </style>
</head>

  <script>
    firebase.initializeApp({
      apiKey:"AIzaSyCxPKZYqiBdlHTr6vUbIVIEvzwxpkeTOEQ",
      authDomain:"turtle-chat-a93fb.firebaseapp.com",
      databaseURL:"https://turtle-chat-a93fb-default-rtdb.firebaseio.com",
      projectId:"turtle-chat-a93fb",
      storageBucket:"turtle-chat-a93fb.appspot.com",
      messagingSenderId:"338945234611",
      appId:"1:338945234611:web:4abe6a3107bdee88b3c2c6"
    });

    const db = firebase.database();
    const loginPage = document.getElementById('loginPage');
    const privateChatPage = document.getElementById('privateChatPage');
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const btnLogin = document.getElementById('btnLogin');
    const btnSignUp = document.getElementById('btnSignUp');
    const btnLogout = document.getElementById('btnLogout');
    const btnProfile = document.getElementById('btnProfile');
    const btnReported = document.getElementById('btnReported');
    const btnUsers = document.getElementById('btnUsers');
    const btnOwnerLogin = document.getElementById('btnOwnerLogin');
    const ttaCodeEl = document.getElementById('ttaCode');
    
    // Add Admin Elements
    const btnAddAdmin = document.getElementById('btnAddAdmin');
    const adminCodeInput = document.getElementById('adminCode');
    const adminNameInput = document.getElementById('adminName');
    const adminColorInput = document.getElementById('adminColor');
    const permReports = document.getElementById('permReports');
    const permUsers = document.getElementById('permUsers');
    const btnCreateAdmin = document.getElementById('btnCreateAdmin');
    const adminList = document.getElementById('adminList');

    const userSearch = document.getElementById('userSearch');
    const userList = document.getElementById('userList');
    const userListView = document.getElementById('userListView');
    const chatView = document.getElementById('chatView');
    const backToUsers = document.getElementById('backToUsers');
    const chatWithTitle = document.getElementById('chatWithTitle');
    const privateChatArea = document.getElementById('privateChatArea');
    const privateMsgInput = document.getElementById('privateMsgInput');
    const privateSendBtn = document.getElementById('privateSendBtn');
    const notificationContainer = document.getElementById('notificationContainer');

    const btnSettings = document.getElementById('btnSettings');
    const websiteBgColorInput = document.getElementById('websiteBgColor');
    const chatBgColorInput = document.getElementById('chatBgColor');
    const buttonColorInput = document.getElementById('buttonColor');
    const buttonTextColorInput = document.getElementById('buttonTextColor');
    const scrollbarColorInput = document.getElementById('scrollbarColor');
    const personalizedNamesList = document.getElementById('personalizedNamesList');
    const btnAddPersonalizedName = document.getElementById('btnAddPersonalizedName');
    const btnSaveSettings = document.getElementById('btnSaveSettings');
    const btnResetSettings = document.getElementById('btnResetSettings');
    const borderColorInput = document.getElementById('borderColor');

    let currentUser = null;
    let currentChatUser = null;
    let usersCache = [];
    let bannedCache = [];
    let contacts = {};
    let pinnedChats = [];
    let currentChatRef = null;
    let contactsRef = null;
    let notificationsRef = null;
    let currentTab = 'chats'; 
    let lastReadTimestamps = {}; 
    let unreadCounts = {}; 
    let lastMessageTimes = {}; 
    let currentProfileTarget = null;
    let selectedReportUser = null;
    let currentViewingReportId = null;
    let banListenerRef = null;
    let userIsAdmin = false;
    let adminPerms = {};

    let userSettings = { buttonColor: '#3f1587', scrollbarColor: '#48326e', buttonTextColor: '#ffffff', websiteBgColor: '#181515', chatBgColor: '#181515', personalizedNames: {}, borderColor: '#3f1587' };

    document.getElementById('tabChats').onclick = () => switchTab('chats');
    document.getElementById('tabNewChat').onclick = () => switchTab('new_chat');
    document.getElementById('tabRequests').onclick = () => switchTab('requests');
    document.getElementById('tabBlocked').onclick = () => switchTab('blocked');

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabChats').classList.toggle('active', tab === 'chats');
      document.getElementById('tabNewChat').classList.toggle('active', tab === 'new_chat');
      document.getElementById('tabRequests').classList.toggle('active', tab === 'requests');
      document.getElementById('tabBlocked').classList.toggle('active', tab === 'blocked');
      renderUserList(userSearch.value);
    }

    function updateUnreadIndicators() {
      const tabChats = document.getElementById('tabChats');
      let existingIndicator = tabChats.querySelector('.unread-indicator');
      const totalUnread = Object.values(unreadCounts).reduce((sum, count) => sum + count, 0);
      
      if (totalUnread > 0) {
        if (!existingIndicator) { existingIndicator = document.createElement('span'); existingIndicator.className = 'unread-indicator'; tabChats.appendChild(existingIndicator); }
        existingIndicator.textContent = '⦿';
      } else if (existingIndicator) {
        existingIndicator.remove();
      }
      renderUserList(userSearch.value);
    }

    function calculateInitialUnreadCounts() {
      unreadCounts = {};
      Object.keys(contacts).forEach(otherUser => {
        if (contacts[otherUser] === 'accepted') {
          const chatId = sortChatId(currentUser, otherUser);
          db.ref('privateMessages/' + chatId).once('value').then(snapshot => {
            const msgs = snapshot.val() || {};
            const lastRead = lastReadTimestamps[otherUser] || 0;
            let unreadCount = 0;
            Object.values(msgs).forEach(msg => { if (msg.from !== currentUser && msg.timestamp > lastRead) { unreadCount++; } });
            if (unreadCount > 0) { unreadCounts[otherUser] = unreadCount; updateUnreadIndicators(); }
          });
        }
      });
    }

    function deletePrivateMessage(chatId, msgId) {
      if (confirm('Are you sure you want to delete this message?')) {
        db.ref('privateMessages/' + chatId + '/' + msgId).update({
            deleted: true,
            deletedAt: Date.now()
        });
      }
    }

    function formatTime(timestamp) {
      return new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function formatDate(timestamp) {
      const date = new Date(timestamp);
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(today.getDate() - 1);
      if (date.toDateString() === today.toDateString()) return 'Today';
      else if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
      else return date.toLocaleDateString();
    }

    function isSameDay(timestamp1, timestamp2) {
      return new Date(timestamp1).toDateString() === new Date(timestamp2).toDateString();
    }

    function showLogin() {
      loginPage.style.display = 'flex';
      privateChatPage.style.display = 'none';
      btnProfile.style.display = 'none';
      btnReported.style.display = 'none';
      btnUsers.style.display = 'none';
      btnAddAdmin.style.display = 'none';
      close('maskSettings');
      close('maskProfile');
      close('maskReports');
      close('maskUsers');
      close('maskAddAdmin');
    }

    function showChat() {
      loginPage.style.display = 'none';
      privateChatPage.style.display = 'flex';
      btnProfile.style.display = 'block';
      
      if (currentUser === 'Owner') {
          btnReported.style.display = 'block';
          btnUsers.style.display = 'block';
          btnAddAdmin.style.display = 'block';
      } else if (userIsAdmin) {
          btnReported.style.display = adminPerms.canViewReports ? 'block' : 'none';
          btnUsers.style.display = adminPerms.canManageUsers ? 'block' : 'none';
          btnAddAdmin.style.display = 'none';
      } else {
          btnReported.style.display = 'none';
          btnUsers.style.display = 'none';
          btnAddAdmin.style.display = 'none';
      }

      showUserListView();
      loadUsers();
      loadUserSettings();
      
      if (!userIsAdmin && currentUser !== 'Owner') {
          db.ref(`users/${currentUser}/online`).set(true);
          db.ref(`users/${currentUser}/lastSeen`).set(Date.now());
      }

      if (banListenerRef) banListenerRef.off();
      banListenerRef = db.ref(`users/${currentUser}`);
      banListenerRef.on('value', snap => {
          if (currentUser && currentUser !== 'Owner' && !userIsAdmin && !snap.exists()) {
              alert("You have been permanently banned");
              location.reload(); 
          }
      });
      
      contactsRef = db.ref(`users/${currentUser}/contacts`);
      contactsRef.on('value', snap => {
        contacts = snap.val() || {};
        pinnedChats = pinnedChats.filter(u => contacts[u] === 'accepted');
        db.ref(`users/${currentUser}/pinnedChats`).set(pinnedChats);
        setupLastMessageTracking();
        renderUserList(userSearch.value);
      });

      db.ref(`users/${currentUser}/pinnedChats`).on('value', snap => {
        pinnedChats = snap.val() || [];
        renderUserList(userSearch.value);
      });

      notificationsRef = db.ref(`notifications/${currentUser}`);
      notificationsRef.on('child_added', snap => {
        const notif = snap.val();
        const notifId = snap.key;
        const isActivelyChatting = (currentChatUser === notif.from && chatView.style.display === 'flex');
        if (!isActivelyChatting) {
          if (!unreadCounts[notif.from]) unreadCounts[notif.from] = 0;
          unreadCounts[notif.from]++;
          updateUnreadIndicators();
        }
        db.ref(`notifications/${currentUser}/${notifId}`).remove();
        if (!isActivelyChatting) {
          triggerNotification(userSettings.personalizedNames[notif.from] || notif.from, notif.text);
        }
      });

      calculateInitialUnreadCounts();
      setupLastMessageTracking();
    }

    function triggerNotification(senderName, messageText) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <div class="toast-header">
          <span>${senderName}</span>
          <button class="close-toast">X</button>
        </div>
        <div class="toast-body">
          ${messageText.length > 50 ? messageText.substring(0, 50) + '...' : messageText}
        </div>
        <div class="toast-footer">
          <button class="open-chat-btn">Open Chat</button>
        </div>
      `;
      toast.querySelector('.close-toast').onclick = () => toast.remove();
      toast.querySelector('.open-chat-btn').onclick = () => { toast.remove(); openPrivateChat(senderName); };
      notificationContainer.appendChild(toast);
    }

    function showUserListView() { userListView.style.display = 'block'; chatView.style.display = 'none'; }
    function showChatView() { userListView.style.display = 'none'; chatView.style.display = 'flex'; }

    function setupLastMessageTracking() {
      Object.keys(contacts).forEach(otherUser => {
        if (contacts[otherUser] === 'accepted') {
          const chatId = sortChatId(currentUser, otherUser);
          db.ref('privateMessages/' + chatId).on('value', snapshot => {
            const msgs = snapshot.val() || {};
            const activeMsgs = Object.values(msgs).filter(m => !m.deleted);
            const timestamps = activeMsgs.map(m => m.timestamp);
            lastMessageTimes[otherUser] = timestamps.length > 0 ? Math.max(...timestamps) : 0;
            if (currentTab === 'chats') renderUserList(userSearch.value);
          });
        }
      });
    }

    function sortChatId(a, b) { return [a, b].sort().join('_'); }

    function updateContact(user, status) {
      if (status === null) db.ref(`users/${currentUser}/contacts/${user}`).remove();
      else db.ref(`users/${currentUser}/contacts/${user}`).set(status);
    }

    function renderUserList(filter = '') {
      const query = filter.trim().toLowerCase();
      userList.innerHTML = '';
      let filtered = usersCache.filter(u => u !== currentUser);

      if (currentTab === 'chats') {
        filtered = filtered.filter(u => contacts[u] === 'accepted');
        filtered.sort((a, b) => {
          const aIndex = pinnedChats.indexOf(a);
          const bIndex = pinnedChats.indexOf(b);
          if (aIndex !== -1 && bIndex !== -1) return aIndex - bIndex;
          if (aIndex !== -1) return -1;
          if (bIndex !== -1) return 1;
          const aTime = lastMessageTimes[a] || 0;
          const bTime = lastMessageTimes[b] || 0;
          return bTime - aTime;
        });
      } else if (currentTab === 'new_chat') {
        filtered = filtered.filter(u => contacts[u] !== 'blocked');
      } else if (currentTab === 'requests') {
        filtered = filtered.filter(u => contacts[u] === 'pending');
      } else if (currentTab === 'blocked') {
        filtered = filtered.filter(u => contacts[u] === 'blocked');
      }

      filtered = filtered.filter(u => !query || u.toLowerCase().includes(query));

      if (filtered.length === 0) {
        userList.innerHTML = `<p style="color:#ccc;">No users found in ${currentTab.replace('_', ' ')}.</p>`;
        return;
      }

      filtered.forEach(u => {
        const row = document.createElement('div');
        row.style.padding = '10px'; row.style.marginBottom = '6px'; row.style.borderRadius = '8px';
        row.style.background = 'rgba(255,255,255,0.05)'; row.style.display = 'flex';
        row.style.justifyContent = 'space-between'; row.style.alignItems = 'center';

        const nameContainer = document.createElement('div');
        nameContainer.style.display = 'flex'; nameContainer.style.alignItems = 'center';

        const nameSpan = document.createElement('span');
        nameSpan.textContent = userSettings.personalizedNames[u] || u;
        if (bannedCache.includes(u)) nameSpan.classList.add('banned-username');
        nameContainer.appendChild(nameSpan);

        const profBtn = document.createElement('button');
        profBtn.textContent = 'Profile'; profBtn.style.padding = '2px 5px'; profBtn.style.marginLeft = '8px';
        profBtn.style.fontSize = '10px'; profBtn.style.backgroundColor = userSettings.buttonColor;
        profBtn.style.color = userSettings.buttonTextColor;
        profBtn.onclick = (e) => { e.stopPropagation(); openUserProfile(u); };
        nameContainer.appendChild(profBtn);

        row.appendChild(nameContainer);

        if (pinnedChats.includes(u)) {
          const dragHandle = document.createElement('span'); dragHandle.textContent = '𓃎';
          dragHandle.style.cursor = 'grab'; dragHandle.style.marginRight = '10px'; dragHandle.style.fontSize = '16px';
          nameContainer.insertBefore(dragHandle, nameSpan);
          row.draggable = true;
          row.ondragstart = (e) => { e.dataTransfer.setData('text/plain', u); };
          row.ondragover = (e) => e.preventDefault();
          row.ondrop = (e) => {
            const draggedUser = e.dataTransfer.getData('text/plain');
            if (draggedUser !== u && pinnedChats.includes(draggedUser) && pinnedChats.includes(u)) {
              const draggedIndex = pinnedChats.indexOf(draggedUser);
              const targetIndex = pinnedChats.indexOf(u);
              pinnedChats.splice(draggedIndex, 1); pinnedChats.splice(targetIndex, 0, draggedUser);
              db.ref(`users/${currentUser}/pinnedChats`).set(pinnedChats);
            }
          };
        }

        const onlineIndicator = document.createElement('span');
        onlineIndicator.style.marginLeft = '5px'; onlineIndicator.dataset.user = u;
        nameContainer.appendChild(onlineIndicator);
        db.ref(`users/${u}/online`).on('value', snap => {
          const indicator = document.querySelector(`[data-user="${u}"]`);
          if (indicator) indicator.textContent = snap.val() === true ? '🟢' : '🔴';
        });

        if (currentTab === 'chats' && unreadCounts[u] > 0) {
          const indicator = document.createElement('span');
          indicator.className = 'user-unread-indicator'; indicator.textContent = '⦿';
          row.appendChild(indicator);
        }

        if (currentTab === 'chats') {
          const buttonsDiv = document.createElement('div');
          buttonsDiv.style.display = 'flex'; buttonsDiv.style.gap = '5px';
          const pinBtn = document.createElement('button'); pinBtn.className = 'action-btn';
          pinBtn.textContent = pinnedChats.includes(u) ? 'Unpin' : 'Pin';
          pinBtn.onclick = (e) => { e.stopPropagation(); togglePin(u); };
          const reportBtn = document.createElement('button'); reportBtn.className = 'action-btn';
          reportBtn.textContent = 'Report';
          reportBtn.onclick = (e) => { e.stopPropagation(); reportChat(u); };
          const blockBtn = document.createElement('button'); blockBtn.className = 'action-btn';
          blockBtn.textContent = 'Block';
          blockBtn.onclick = (e) => { e.stopPropagation(); blockUser(u); };
          const deleteBtn = document.createElement('button'); deleteBtn.className = 'action-btn';
          deleteBtn.textContent = 'Delete';
          deleteBtn.onclick = (e) => { e.stopPropagation(); deleteChat(u); };
          buttonsDiv.append(pinBtn, reportBtn, blockBtn, deleteBtn);
          row.appendChild(buttonsDiv);
        }

        if (currentTab === 'chats' || currentTab === 'new_chat') {
          row.style.cursor = 'pointer'; row.onclick = () => openPrivateChat(u);
        } else if (currentTab === 'requests') {
          const btnDiv = document.createElement('div');
          const btnAccept = document.createElement('button'); btnAccept.className = 'action-btn btn-accept'; btnAccept.textContent = 'Accept';
          btnAccept.onclick = (e) => { e.stopPropagation(); updateContact(u, 'accepted'); };
          const btnDeny = document.createElement('button'); btnDeny.className = 'action-btn btn-deny'; btnDeny.textContent = 'Deny';
          btnDeny.onclick = (e) => { e.stopPropagation(); updateContact(u, 'hidden_request'); };
          const btnBlock = document.createElement('button'); btnBlock.className = 'action-btn btn-block'; btnBlock.textContent = 'Block';
          btnBlock.onclick = (e) => { e.stopPropagation(); updateContact(u, 'blocked'); };
          btnDiv.append(btnAccept, btnDeny, btnBlock); row.appendChild(btnDiv);
        } else if (currentTab === 'blocked') {
          const btnUnblock = document.createElement('button'); btnUnblock.className = 'action-btn btn-unblock'; btnUnblock.textContent = 'Unblock';
          btnUnblock.onclick = (e) => { e.stopPropagation(); unblockUser(u); };
          row.appendChild(btnUnblock);
        }
        userList.appendChild(row);
      });
    }

    function togglePin(user) {
      if (pinnedChats.includes(user)) pinnedChats = pinnedChats.filter(u => u !== user);
      else pinnedChats.push(user);
      db.ref(`users/${currentUser}/pinnedChats`).set(pinnedChats);
      renderUserList(userSearch.value); 
    }

    function reportChat(user) {
      const chatId = sortChatId(currentUser, user);
      db.ref('reports').push({ 
          reporter: currentUser, 
          reportedUser: user, 
          chatId: chatId, 
          status: 'active',
          timestamp: Date.now() 
      });
      alert('Chat reported.');
    }

    function blockUser(user) { updateContact(user, 'blocked'); }

    function unblockUser(user) {
      const chatId = sortChatId(currentUser, user);
      db.ref('privateMessages/' + chatId).once('value').then(snapshot => {
        const hasMessages = snapshot.exists() && Object.keys(snapshot.val() || {}).length > 0;
        updateContact(user, hasMessages ? 'accepted' : null);
      });
    }

    function deleteChat(user) { updateContact(user, null); }

    function openPrivateChat(otherUser) {
      currentChatUser = otherUser;
      chatWithTitle.innerHTML = `<span class="${bannedCache.includes(otherUser) ? 'banned-username' : ''}">Chat with ${userSettings.personalizedNames[otherUser] || otherUser}</span> <button onclick="openUserProfile('${otherUser}')" style="font-size:12px; padding:4px 8px; margin-left:10px; border-radius:4px; cursor:pointer; background-color:${userSettings.buttonColor}; color:${userSettings.buttonTextColor}; border:none;">Profile</button>`;
      showChatView();
      privateChatArea.innerHTML = ''; lastReadTimestamps[otherUser] = Date.now();
      unreadCounts[otherUser] = 0; updateUnreadIndicators();

      if (currentChatRef) currentChatRef.off();
      const chatId = sortChatId(currentUser, otherUser);
      currentChatRef = db.ref('privateMessages/' + chatId);

      currentChatRef.once('value').then(snapshot => {
        const msgs = snapshot.val() || {};
        Object.keys(msgs).forEach(msgId => {
          const msg = msgs[msgId];
          if (msg.from === otherUser && !msg.seenBy) {
            db.ref('privateMessages/' + chatId + '/' + msgId + '/seenBy').set(currentUser);
            db.ref('privateMessages/' + chatId + '/' + msgId + '/seenAt').set(Date.now());
          }
        });
      });

      currentChatRef.on('value', snapshot => {
        const msgs = snapshot.val() || {};
        privateChatArea.innerHTML = '';
        const msgIds = Object.keys(msgs).sort((a, b) => (msgs[a].timestamp || 0) - (msgs[b].timestamp || 0));
        let currentDate = null;
        
        msgIds.forEach(msgId => {
          const msg = msgs[msgId];
          if (msg.deleted && currentUser !== 'Owner' && !userIsAdmin) return;

          if (!currentDate || !isSameDay(currentDate, msg.timestamp)) {
            const dateSep = document.createElement('div'); dateSep.className = 'date-sep';
            dateSep.textContent = formatDate(msg.timestamp); privateChatArea.appendChild(dateSep);
            currentDate = msg.timestamp;
          }
          
          const div = document.createElement('div');
          div.className = 'message'; div.style.padding = '8px'; div.style.marginBottom = '6px'; div.style.borderRadius = '8px';
          div.style.alignSelf = msg.from === currentUser ? 'flex-start' : 'flex-end';
          div.style.background = msg.from === currentUser ? 'rgba(34,139,34,0.4)' : 'rgba(255,255,255,0.1)';
          div.style.maxWidth = '75%';
          
          const messageText = document.createElement('div');
          messageText.innerHTML = msg.text + (msg.deleted ? ' <span style="color:red; font-size:10px;">[DELETED]</span>' : '');
          div.appendChild(messageText);
          
          const timestampDiv = document.createElement('div'); timestampDiv.className = 'timestamp';
          timestampDiv.textContent = formatTime(msg.timestamp); div.appendChild(timestampDiv);
          
          if (msg.from === currentUser) {
            const statusDiv = document.createElement('div'); statusDiv.style.fontSize = '10px'; statusDiv.style.color = '#ccc'; statusDiv.style.textAlign = 'right'; statusDiv.style.marginTop = '2px';
            if (msg.seenBy === currentChatUser) statusDiv.textContent = 'Seen';
            else { db.ref(`users/${currentChatUser}/online`).once('value').then(snap => { if (snap.val() === true) statusDiv.textContent = 'Delivered'; }); }
            div.appendChild(statusDiv);
          }
          
          if (msg.from === currentUser) {
            const deleteBtn = document.createElement('button'); deleteBtn.className = 'del-btn'; deleteBtn.textContent = '✖';
            deleteBtn.onclick = () => deletePrivateMessage(chatId, msgId);
            div.appendChild(deleteBtn);
          }
          privateChatArea.appendChild(div);
        });
        privateChatArea.scrollTop = privateChatArea.scrollHeight;
      });
    }

      db.ref('privateMessages/' + chatId).push({ from: currentUser, text, timestamp: Date.now() });

      db.ref(`users/${currentChatUser}/contacts/${currentUser}`).once('value', snap => {

      });

    backToUsers.onclick = () => { if (currentChatRef) currentChatRef.off(); currentChatUser = null; showUserListView(); };

    function switchMgmtTab(tab) {
        document.getElementById('tabNotBanned').classList.toggle('active', tab === 'not_banned');
        document.getElementById('tabBanned').classList.toggle('active', tab === 'banned');
        renderMgmtList(tab);
    }

    function renderMgmtList(tab) {
        const list = document.getElementById('mgmtList');
        list.innerHTML = "Loading...";
        const refPath = tab === 'not_banned' ? 'users' : 'bannedUsers';
        db.ref(refPath).once('value', snap => {
            list.innerHTML = "";
            const users = snap.val() || {};
            Object.keys(users).forEach(u => {
                if(u === 'Owner') return;
                const data = users[u];
                const item = document.createElement('div');
                item.className = 'user-mgmt-item';
                if(tab === 'not_banned') {
                    item.innerHTML = `
                        <div>
                            <strong>${u}</strong><br>
                            <small>PW: ${data.password} | Created: ${new Date(data.createdAt || 0).toLocaleDateString()}</small>
                        </div>
                        <button onclick="banUser('${u}')" style="background:crimson;">Ban</button>
                    `;
                } else {
                    item.innerHTML = `<div><strong>${u}</strong></div><button onclick="unbanUser('${u}')" style="background:#28a745;">Unban</button>`;
                }
                list.appendChild(item);
            });
        });
    }

    window.banUser = (u) => {
        if(!confirm(`Ban ${u} and delete active account?`)) return;
        db.ref('users/'+u).once('value', snap => {
            const data = snap.val();
            db.ref('bannedUsers/'+u).set(data).then(() => {
                db.ref('users/'+u).remove();
                alert(u + " banned.");
                renderMgmtList('not_banned');
            });
        });
    };

    window.unbanUser = (u) => {
        db.ref('bannedUsers/'+u).once('value', snap => {
            const data = snap.val();
            db.ref('users/'+u).set(data).then(() => {
                db.ref('bannedUsers/'+u).remove();
                alert(u + " unbanned.");
                renderMgmtList('banned');
            });
        });
    };

    window.renderReportsList = function(status) {
      currentReportTab = status;
      document.getElementById('tabActiveReports').classList.toggle('active', status === 'active');
      document.getElementById('tabClosedReports').classList.toggle('active', status === 'closed');
      document.getElementById('tabDismissedReports').classList.toggle('active', status === 'dismissed');

      const reportsList = document.getElementById('reportsList');
      reportsList.innerHTML = "Loading reports...";

      db.ref('reports').on('value', snap => {
        reportsList.innerHTML = "";
        const reports = snap.val();
        if (!reports) { reportsList.innerHTML = "<p>No reports found.</p>"; return; }

        let count = 0;
        Object.keys(reports).forEach(id => {
          const r = reports[id];
          const rStatus = r.status || 'active';
          if (rStatus !== status) return;
          count++;

          const item = document.createElement('div');
          item.className = 'report-item';
          item.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <div>
                <strong>Reporter:</strong> ${r.reporter} <br>
                <strong>Reported:</strong> <span style="color:orange">${r.reportedUser}</span> <br>
                <small>${new Date(r.timestamp).toLocaleString()}</small>
              </div>
              <div style="display:flex; gap:5px;">
                ${status === 'active' ? `<button onclick="updateReportStatus('${id}', 'closed')" style="background:#6c757d;">Hide</button>` : ''}
                ${status !== 'active' ? `<button onclick="updateReportStatus('${id}', 'active')" style="background:#28a745;">Recover</button>` : ''}
                <button onclick="viewReportDetail('${id}')">View Chat</button>
              </div>
            </div>
          `;
          reportsList.appendChild(item);
        });
        if (count === 0) reportsList.innerHTML = `<p>No reports in ${status}.</p>`;
      });
    };

    window.updateReportStatus = function(reportId, newStatus) {
      db.ref(`reports/${reportId}`).update({ status: newStatus });
    };

    window.viewReportDetail = function(reportId) {
      currentViewingReportId = reportId;
      db.ref('reports/' + reportId).once('value', snap => {
        const r = snap.val(); selectedReportUser = r.reportedUser;
        
        document.getElementById('bannedSign').style.display = (r.status === 'closed' && r.wasBanned) ? 'block' : 'none';
        document.getElementById('reportDetailTitle').textContent = "Evidence: Chat with " + r.reportedUser;
        const content = document.getElementById('reportedChatContent');
        content.innerHTML = "Fetching history...";

        db.ref('privateMessages/' + r.chatId).once('value', chatSnap => {
            content.innerHTML = "";
            const msgs = chatSnap.val() || {};
            const sortedMsgs = Object.values(msgs).sort((a,b) => a.timestamp - b.timestamp);
            sortedMsgs.forEach(m => {
                const p = document.createElement('div'); p.style.marginBottom = "5px";
                p.style.opacity = m.deleted ? "0.6" : "1";
                p.innerHTML = `<strong style="color:#00c50a">${m.from}:</strong> ${m.text} 
                               ${m.deleted ? '<span style="color:red; font-size:9px;">[DELETED]</span>' : ''}
                               <br><small style="font-size:9px; color:#888;">(${formatTime(m.timestamp)})</small>`;
                content.appendChild(p);
            });
        });
        open('maskViewReportedChat');
      });
    };

    document.getElementById('btnDismissReport').onclick = () => {
      if (currentViewingReportId) {
        updateReportStatus(currentViewingReportId, 'dismissed');
        close('maskViewReportedChat');
        alert("Report moved to Dismissed.");
      }
    };

    document.getElementById('btnBanReportedUser').onclick = () => {
      if (!selectedReportUser || !currentViewingReportId) return;
      window.banUser(selectedReportUser);
      db.ref(`reports/${currentViewingReportId}`).update({ wasBanned: true, status: 'closed' });
      close('maskViewReportedChat');
    };

    window.openUserProfile = function(targetUser) {
      currentProfileTarget = targetUser;
      const isBanned = bannedCache.includes(targetUser);
      const rootPath = isBanned ? 'bannedUsers' : 'users';
      
      db.ref(`${rootPath}/${targetUser}/profile`).get().then(snap => {
        const p = snap.val() || {};
        const title = document.getElementById('profDisplayUsername');
        title.textContent = targetUser;
        title.className = isBanned ? 'banned-username' : '';
        
        document.getElementById('profBannedNotice').style.display = isBanned ? 'block' : 'none';
        document.getElementById('profAboutLabel').textContent = isBanned ? '' : `About ${targetUser}:`;
        document.getElementById('profCustomName').value = p.customName || '';
        document.getElementById('profAbout').value = p.about || '';
        document.getElementById('profBirthMonth').value = p.birthMonth || '';
        document.getElementById('profBirthDay').value = p.birthDay || '';
        
        const isMe = (targetUser === currentUser), canEdit = (isMe || currentUser === 'Owner' || userIsAdmin) && !isBanned;
        document.getElementById('profCustomName').disabled = !canEdit; document.getElementById('profAbout').disabled = !canEdit;
        document.getElementById('profBirthMonth').disabled = !canEdit; document.getElementById('profBirthDay').disabled = !canEdit;
        
        if (currentUser === 'Owner' || userIsAdmin) {
          document.getElementById('profDisplayType').style.display = 'none'; document.getElementById('profEditType').style.display = 'block';
          document.getElementById('profEditType').value = p.userType || (targetUser === 'Owner' ? 'Owner' : 'User');
        } else {
          document.getElementById('profDisplayType').style.display = 'block'; document.getElementById('profEditType').style.display = 'none';
          document.getElementById('profDisplayType').textContent = p.userType || 'User';
        }
        document.getElementById('btnSaveProfile').style.display = canEdit ? 'block' : 'none';
        open('maskProfile');
      });
    };

    btnProfile.onclick = () => openUserProfile(currentUser);
    document.getElementById('btnSaveProfile').onclick = () => {
      if(!currentProfileTarget) return;
      const updates = { customName: document.getElementById('profCustomName').value.trim(), about: document.getElementById('profAbout').value.trim(), birthMonth: document.getElementById('profBirthMonth').value, birthDay: document.getElementById('profBirthDay').value };
      if (currentUser === 'Owner' || userIsAdmin) updates.userType = document.getElementById('profEditType').value;
      db.ref('users/' + currentProfileTarget + '/profile').update(updates).then(() => { alert('Profile Saved!'); close('maskProfile'); });
    };

    // Add Admin Functionality
    btnAddAdmin.onclick = () => { 
        document.getElementById('adminFormTitle').textContent = 'Create Pix Admin';
        btnCreateAdmin.textContent = 'Create';
        
        adminCodeInput.value = '';
        adminNameInput.value = '';
        adminColorInput.value = '#0000ff';
        permReports.checked = false;
        permUsers.checked = false;
        
        btnCreateAdmin.onclick = createAdminHandler;
        
        open('maskAddAdmin'); 
        loadAdmins(); 
    };

    const createAdminHandler = () => {
      const code = adminCodeInput.value.trim();
      const name = adminNameInput.value.trim();
      const color = adminColorInput.value.trim();
      
      const permissions = {
          canViewReports: permReports.checked,
          canManageUsers: permUsers.checked
      };
      
      if (!code || !name || !color) { alert('Fill all fields'); return; }
      db.ref('admins/' + code).set({ name, color, permissions });
      alert('Admin created');
      
      adminCodeInput.value = '';
      adminNameInput.value = '';
      adminColorInput.value = '#0000ff';
      permReports.checked = false;
      permUsers.checked = false;
      
      loadAdmins();
    };
    btnCreateAdmin.onclick = createAdminHandler;

    function loadAdmins() {
      adminList.innerHTML = '';
      db.ref('admins').get().then(snapshot => {
        const admins = snapshot.val() || {};
        Object.keys(admins).forEach(code => {
          const admin = admins[code];
          const div = document.createElement('div');
          div.style.padding = '8px';
          div.style.borderBottom = '1px solid #444';
          div.style.display = 'flex';
          div.style.alignItems = 'center';
          div.style.justifyContent = 'space-between';

          const info = document.createElement('span');
          info.textContent = `${admin.name} (${code})`;
          info.style.color = admin.color;
          info.style.fontWeight = 'bold';

          const btns = document.createElement('div');
          const editBtn = document.createElement('button');
          editBtn.textContent = 'Edit';
          editBtn.style.marginRight = '5px';
          editBtn.onclick = () => editAdmin(code, admin);
          
          const banBtn = document.createElement('button');
          banBtn.textContent = 'Ban';
          banBtn.style.background = 'crimson';
          banBtn.onclick = () => { 
            if(confirm(`Remove admin privileges from ${admin.name}?`)){
               db.ref('admins/' + code).remove().then(() => loadAdmins()); 
            }
          };

          btns.appendChild(editBtn);
          btns.appendChild(banBtn);
          div.appendChild(info);
          div.appendChild(btns);
          adminList.appendChild(div);
        });
      });
    }

    function editAdmin(code, admin) {
      document.getElementById('adminFormTitle').textContent = 'Edit Pix Admin';
      btnCreateAdmin.textContent = 'Save Changes';
        
      adminCodeInput.value = code;
      adminNameInput.value = admin.name;
      adminColorInput.value = admin.color;
      
      const p = admin.permissions || {};
      permReports.checked = !!p.canViewReports;
      permUsers.checked = !!p.canManageUsers;
      
      btnCreateAdmin.onclick = () => {
        const newCode = adminCodeInput.value.trim();
        const newName = adminNameInput.value.trim();
        const newColor = adminColorInput.value.trim();
        
        const permissions = {
            canViewReports: permReports.checked,
            canManageUsers: permUsers.checked
        };
        
        if (!newCode || !newName || !newColor) { alert('Fill all fields'); return; }
        
        db.ref('admins/' + code).remove().then(() => {
          db.ref('admins/' + newCode).set({ name: newName, color: newColor, permissions });
          alert('Admin updated');
          
          adminCodeInput.value = '';
          adminNameInput.value = '';
          adminColorInput.value = '#0000ff';
          permReports.checked = false;
          permUsers.checked = false;
          
          document.getElementById('adminFormTitle').textContent = 'Create Pix Admin';
          btnCreateAdmin.textContent = 'Create';
          btnCreateAdmin.onclick = createAdminHandler;
          
          loadAdmins();
        });
      };
    }

    showLogin();
    window.addEventListener('beforeunload', () => {
      if (currentUser && currentUser !== "Owner" && !userIsAdmin) { db.ref(`users/${currentUser}/online`).set(false); db.ref(`users/${currentUser}/lastSeen`).set(Date.now()); }
    });
  </script>
</body>
</html>
