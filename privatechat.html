<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Chats</title>
  <style>
    :root { --black:#181515; --dark-gray:#181515; --green:#3f1587; --white:#ffffff; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body,html { height:100%; background:var(--black); font-family:Arial,sans-serif; color:var(--white); display:flex; justify-content:center; align-items:center; }
    #loginPage,#privateChatPage { width:100%; height:100%; flex-direction:column; justify-content:center; align-items:center; display:none; }
    .form-group { margin:8px 0; }
    input, textarea, select { padding:8px; border:none; border-radius:6px; width:200px; }
    button { background:var(--green); border:none; padding:8px 16px; border-radius:6px; cursor:pointer; color:var(--white); transition:0.2s; margin:2px; }
    button:hover { transform:scale(1.05); }
    .logout-btn { position:absolute; top:10px; right:10px; background:crimson; }
    .global-chat-btn { position:absolute; top:10px;}
    .private-chat-container { width:80vw; height:80vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; }
    
    /* New Tab and Action Button Styles */
    .tab-container { display:flex; gap:5px; margin-bottom:8px; width:100%; }
    .tab-btn { background: rgba(255,255,255,0.1); flex: 1; border-radius: 6px; padding: 8px; font-weight: bold; }
    .tab-btn.active { background: var(--green); }
    .action-btn { font-size: 12px; padding: 5px 10px; margin-left: 5px; border-radius: 4px; }
    .btn-accept { background: #28a745; }
    .btn-deny { background: #ffc107; color: #000; }
    .btn-block { background: #dc3545; }
    .btn-unblock { background: #6c757d; }
  </style>
</head>
<body>
  <button class="global-chat-btn" onclick="location.href='index.html'">Global Chat</button>

  <div id="loginPage">
    <h1>Private Chats</h1>
    <div class="form-group"><input id="username" placeholder="Username"></div>
    <div class="form-group"><input id="password" type="password" placeholder="Password"></div>
    <div class="form-group">
      <button id="btnLogin">Login</button>
      <button id="btnSignUp">Sign Up</button>
    </div>
    <div class="form-group">
      <input id="ttaCode" placeholder="TTA Code">
      <button id="btnOwnerLogin">Admin Login</button>
    </div>
  </div>

  <div id="privateChatPage" style="display:none; width:100%; height:100%; flex-direction:column; justify-content:center; align-items:center;">
    <button class="logout-btn" id="btnLogout">Logout</button>
    <div class="private-chat-container">
      
      <div id="userListView" style="width:100%; max-width:800px;">
        <h2>Private Chats</h2>
        <input id="userSearch" placeholder="Search users..." style="width:100%; padding:8px; border-radius:6px; border:none; margin:8px 0;" />
        
        <div class="tab-container">
          <button class="tab-btn active" id="tabChats">Chats</button>
          <button class="tab-btn" id="tabNewChat">New Chat</button>
          <button class="tab-btn" id="tabRequests">Requests</button>
          <button class="tab-btn" id="tabBlocked">Blocked</button>
        </div>

        <div id="userList" style="max-height:60vh; overflow-y:auto; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:10px;"></div>
      </div>

      <div id="chatView" style="display:none; width:100%; max-width:800px; height:80vh; display:flex; flex-direction:column;">
        <div style="display:flex; align-items:center; justify-content:space-between; padding:8px;">
          <button id="backToUsers" style="background:transparent; border:none; color:var(--white); cursor:pointer; font-size:16px;">← Back</button>
          <h2 id="chatWithTitle" style="margin:0;">Chat</h2>
          <div style="width:40px;"></div>
        </div>
        <div id="privateChatArea" style="flex:1; overflow-y:auto; padding:12px; background:rgba(0,0,0,0.2); border-radius:12px;"></div>
        <div style="display:flex; gap:8px; margin-top:10px;">
          <input id="privateMsgInput" placeholder="Type your message..." style="flex:1; padding:8px; border-radius:6px; border:none;" />
          <button id="privateSendBtn">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:"AIzaSyCxPKZYqiBdlHTr6vUbIVIEvzwxpkeTOEQ",
      authDomain:"turtle-chat-a93fb.firebaseapp.com",
      databaseURL:"https://turtle-chat-a93fb-default-rtdb.firebaseio.com",
      projectId:"turtle-chat-a93fb",
      storageBucket:"turtle-chat-a93fb.appspot.com",
      messagingSenderId:"338945234611",
      appId:"1:338945234611:web:4abe6a3107bdee88b3c2c6"
    });

    const db = firebase.database();
    const loginPage = document.getElementById('loginPage');
    const privateChatPage = document.getElementById('privateChatPage');
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const btnLogin = document.getElementById('btnLogin');
    const btnSignUp = document.getElementById('btnSignUp');
    const btnLogout = document.getElementById('btnLogout');

    const userSearch = document.getElementById('userSearch');
    const userList = document.getElementById('userList');
    const userListView = document.getElementById('userListView');
    const chatView = document.getElementById('chatView');
    const backToUsers = document.getElementById('backToUsers');
    const chatWithTitle = document.getElementById('chatWithTitle');
    const privateChatArea = document.getElementById('privateChatArea');
    const privateMsgInput = document.getElementById('privateMsgInput');
    const privateSendBtn = document.getElementById('privateSendBtn');

    let currentUser = null;
    let currentChatUser = null;
    let usersCache = [];
    let contacts = {}; // Store relation status: 'accepted', 'pending', 'blocked', 'hidden_request'
    let currentChatRef = null;
    let contactsRef = null;
    let currentTab = 'chats'; // Default tab

    // Tab Listeners
    document.getElementById('tabChats').onclick = () => switchTab('chats');
    document.getElementById('tabNewChat').onclick = () => switchTab('new_chat');
    document.getElementById('tabRequests').onclick = () => switchTab('requests');
    document.getElementById('tabBlocked').onclick = () => switchTab('blocked');

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabChats').classList.toggle('active', tab === 'chats');
      document.getElementById('tabNewChat').classList.toggle('active', tab === 'new_chat');
      document.getElementById('tabRequests').classList.toggle('active', tab === 'requests');
      document.getElementById('tabBlocked').classList.toggle('active', tab === 'blocked');
      renderUserList(userSearch.value);
    }

    function showLogin() {
      loginPage.style.display = 'flex';
      privateChatPage.style.display = 'none';
    }

    function showChat() {
      loginPage.style.display = 'none';
      privateChatPage.style.display = 'flex';
      showUserListView();
      loadUsers();
      
      // Listen to contacts/relationships for the logged in user
      contactsRef = db.ref(`users/${currentUser}/contacts`);
      contactsRef.on('value', snap => {
        contacts = snap.val() || {};
        renderUserList(userSearch.value);
      });
    }

    function showUserListView() {
      userListView.style.display = 'block';
      chatView.style.display = 'none';
    }

    function showChatView() {
      userListView.style.display = 'none';
      chatView.style.display = 'flex';
    }

    function sortChatId(a, b) {
      return [a, b].sort().join('_');
    }

    // Helper to update contact status
    function updateContact(user, status) {
      if (status === null) {
        db.ref(`users/${currentUser}/contacts/${user}`).remove();
      } else {
        db.ref(`users/${currentUser}/contacts/${user}`).set(status);
      }
    }

    function renderUserList(filter = '') {
      const query = filter.trim().toLowerCase();
      userList.innerHTML = '';
      
      // Filter out the current user
      let filtered = usersCache.filter(u => u !== currentUser);

      // Filter based on the selected Tab
      if (currentTab === 'chats') {
        filtered = filtered.filter(u => contacts[u] === 'accepted');
      } else if (currentTab === 'new_chat') {
        filtered = filtered.filter(u => contacts[u] !== 'blocked'); // Show all except blocked
      } else if (currentTab === 'requests') {
        filtered = filtered.filter(u => contacts[u] === 'pending');
      } else if (currentTab === 'blocked') {
        filtered = filtered.filter(u => contacts[u] === 'blocked');
      }

      // Filter based on Search
      filtered = filtered.filter(u => !query || u.toLowerCase().includes(query));

      if (filtered.length === 0) {
        userList.innerHTML = `<p style="color:#ccc;">No users found in ${currentTab.replace('_', ' ')}.</p>`;
        return;
      }

      filtered.forEach(u => {
        const row = document.createElement('div');
        row.style.padding = '10px';
        row.style.marginBottom = '6px';
        row.style.borderRadius = '8px';
        row.style.background = 'rgba(255,255,255,0.05)';
        row.style.display = 'flex';
        row.style.justifyContent = 'space-between';
        row.style.alignItems = 'center';

        const nameSpan = document.createElement('span');
        nameSpan.textContent = u;
        row.appendChild(nameSpan);

        if (currentTab === 'chats' || currentTab === 'new_chat') {
          row.style.cursor = 'pointer';
          row.onclick = () => openPrivateChat(u);
        } else if (currentTab === 'requests') {
          const btnDiv = document.createElement('div');

          const btnAccept = document.createElement('button');
          btnAccept.className = 'action-btn btn-accept';
          btnAccept.textContent = 'Accept';
          btnAccept.onclick = (e) => { e.stopPropagation(); updateContact(u, 'accepted'); };

          const btnDeny = document.createElement('button');
          btnDeny.className = 'action-btn btn-deny';
          btnDeny.textContent = 'Deny';
          btnDeny.onclick = (e) => { e.stopPropagation(); updateContact(u, 'hidden_request'); };

          const btnBlock = document.createElement('button');
          btnBlock.className = 'action-btn btn-block';
          btnBlock.textContent = 'Block';
          btnBlock.onclick = (e) => { e.stopPropagation(); updateContact(u, 'blocked'); };

          btnDiv.append(btnAccept, btnDeny, btnBlock);
          row.appendChild(btnDiv);
        } else if (currentTab === 'blocked') {
          const btnUnblock = document.createElement('button');
          btnUnblock.className = 'action-btn btn-unblock';
          btnUnblock.textContent = 'Unblock';
          btnUnblock.onclick = (e) => { e.stopPropagation(); updateContact(u, null); };
          row.appendChild(btnUnblock);
        }

        userList.appendChild(row);
      });
    }

    function loadUsers() {
      db.ref('users').on('value', snapshot => {
        const val = snapshot.val() || {};
        usersCache = Object.keys(val);
        renderUserList(userSearch.value);
      });
    }

    userSearch.addEventListener('input', () => {
      renderUserList(userSearch.value);
    });

    function openPrivateChat(otherUser) {
      currentChatUser = otherUser;
      chatWithTitle.textContent = `Chat with ${otherUser}`;
      showChatView();
      privateChatArea.innerHTML = '';

      if (currentChatRef) {
        currentChatRef.off();
      }

      const chatId = sortChatId(currentUser, otherUser);
      currentChatRef = db.ref('privateMessages/' + chatId);

      currentChatRef.on('value', snapshot => {
        const msgs = snapshot.val() || {};
        privateChatArea.innerHTML = '';
        Object.values(msgs)
          .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0))
          .forEach(msg => {
            const div = document.createElement('div');
            div.style.padding = '8px';
            div.style.marginBottom = '6px';
            div.style.borderRadius = '8px';
            div.style.background = msg.from === currentUser ? 'rgba(34,139,34,0.4)' : 'rgba(255,255,255,0.1)';
            div.style.alignSelf = msg.from === currentUser ? 'flex-end' : 'flex-start';
            div.style.maxWidth = '75%';
            div.textContent = msg.text;
            privateChatArea.appendChild(div);
          });
        privateChatArea.scrollTop = privateChatArea.scrollHeight;
      });
    }

    privateSendBtn.onclick = () => {
      const text = privateMsgInput.value.trim();
      if (!text || !currentChatUser) return;
      const chatId = sortChatId(currentUser, currentChatUser);
      
      // 1. Send Message
      db.ref('privateMessages/' + chatId).push({ from: currentUser, text, timestamp: Date.now() });
      privateMsgInput.value = '';

      // 2. Add receiver to sender's "Chats" automatically if not already there
      if (contacts[currentChatUser] !== 'accepted') {
        db.ref(`users/${currentUser}/contacts/${currentChatUser}`).set('accepted');
      }

      // 3. Update the receiver's requests list
      db.ref(`users/${currentChatUser}/contacts/${currentUser}`).once('value', snap => {
        const receiverStatus = snap.val();
        // If receiver hasn't blocked the sender and hasn't accepted them yet
        if (receiverStatus !== 'blocked' && receiverStatus !== 'accepted') {
            // Even if it was previously denied ('hidden_request'), setting it to 'pending'
            // makes it visible in their Requests tab again.
            db.ref(`users/${currentChatUser}/contacts/${currentUser}`).set('pending');
        }
      });
    };

    backToUsers.onclick = () => {
      if (currentChatRef) {
        currentChatRef.off();
        currentChatRef = null;
      }
      currentChatUser = null;
      showUserListView();
    };

    btnSignUp.onclick = () => {
      const u = usernameEl.value.trim();
      const p = passwordEl.value.trim();
      if (!u || !p) {
        alert('Fill in username and password');
        return;
      }
      db.ref('users/' + u).set({ password: p });
      alert('Account created');
    };

    btnLogin.onclick = () => {
      const u = usernameEl.value.trim();
      const p = passwordEl.value.trim();
      if (!u || !p) {
        alert('Fill in username and password');
        return;
      }
      db.ref('users/' + u).get().then(s => {
        const d = s.val();
        if (d && d.password === p) {
          currentUser = u;
          showChat();
        } else {
          alert('Invalid username or password');
        }
      });
    };

    btnLogout.onclick = () => {
      if (contactsRef) contactsRef.off();
      currentUser = null;
      contacts = {};
      showLogin();
      usernameEl.value = '';
      passwordEl.value = '';
    };

    showLogin();
  </script>
</body>
</html>
